version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: patternscanner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: patternscanner
      POSTGRES_PASSWORD: patternscanner
      POSTGRES_DB: patternscanner
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U patternscanner']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: patternscanner-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@patternscanner.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
